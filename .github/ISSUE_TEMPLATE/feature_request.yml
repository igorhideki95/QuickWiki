name: Feature request
description: Sugira uma melhoria, ajuste de experiência ou nova capacidade para o QuickWiki.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Obrigado pela sugestão. Ideias com bom contexto ajudam muito a manter o projeto evoluindo com foco.
  - type: textarea
    id: problem
    attributes:
      label: Problema ou oportunidade
      description: Qual dor ou limitação esta sugestão resolve?
      placeholder: Hoje fica difícil...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposta
      description: Descreva a solução que você gostaria de ver.
      placeholder: Eu gostaria que o QuickWiki...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Se houver, descreva outras formas de resolver o mesmo problema.
  - type: textarea
    id: impact
    attributes:
      label: Impacto esperado
      description: Quem se beneficia e em qual parte do fluxo?
      placeholder: Usuários da CLI, da GUI, da documentação...
  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Links, referências ou exemplos que ajudem a entender a ideia.
