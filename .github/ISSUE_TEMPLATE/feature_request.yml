name: Feature request
description: Sugira uma melhoria, ajuste de experiencia ou nova capacidade para o QuickWiki.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Obrigado pela sugestao. Ideias com bom contexto ajudam muito a manter o projeto evoluindo com foco.
  - type: textarea
    id: problem
    attributes:
      label: Problema ou oportunidade
      description: Qual dor ou limitacao esta sugestao resolve?
      placeholder: Hoje fica dificil...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposta
      description: Descreva a solucao que voce gostaria de ver.
      placeholder: Eu gostaria que o QuickWiki...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Se houver, descreva outras formas de resolver o mesmo problema.
  - type: textarea
    id: impact
    attributes:
      label: Impacto esperado
      description: Quem se beneficia e em qual parte do fluxo?
      placeholder: Usuarios da CLI, da GUI, da documentacao...
  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Links, referencias ou exemplos que ajudem a entender a ideia.
